<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        nav{
            height: 100px;
            background-color: rgb(25, 25, 71);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: rgb(57, 57, 64) 0px 6px 10px;
        }
        .logoname{
            font-size: 30px;
            color: white;
            font-weight: bold;
        }
        .logoname:hover{
            cursor: pointer;
        }
        ul{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
        }
        ul li{
            list-style: none;
        }
        ul li a{
            text-decoration: none;
            color: aliceblue;
            font-size: 22px;
            transition: all 1.5s ease;
        }
        ul li a:hover{
            background-color: rgb(32, 32, 138);
            padding: 13px 20px;
            border-radius: 15px;
            transition: 1.5s ease;
        }
        .hamburger{
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }
        .hamburger span{
            width: 25px;
            height: 3px;
            background-color: white;
        }

        @media (max-width:768px) {

            nav{
                justify-content: space-between;
                padding: 0px 30px;
                
            }

            .second{
                position: absolute;
                top: 100px;
                left: 0px;
                width: 100%;
                background-color: rgb(25, 25, 71);
                display: none;
                box-shadow: rgb(57, 57, 64) 0px 6px 10px;
            }
            .second ul{
                flex-direction: column;
                gap: 20px;
                padding: 20px 0px;

            }

            .hamburger{
                display: flex;
            }
            .second.active{
                display: block;
            }
        }
        .home{
            height: 100vh;
            background:linear-gradient(rgba(52, 51, 51, 0.3) ), url("../img/hero.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    
    <header>

        <nav>

            <div class="first">
                <div class="logoname">Car Showroom</div>
            </div>

            <div class="second">
                <ul>
                    <li><a href="">Home</a></li>
                    <li><a href="">About Us</a></li>
                    <li><a href="">Reviews</a></li>
                    <li><a href="">Contact Us</a></li>
                </ul>
            </div>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

        </nav>

    </header>

    <main>

        <section class="home">

        </section>

    </main>

    <script>
        const hamburger = document.querySelector(".hamburger");
        const menu = document.querySelector(".second");

        hamburger.addEventListener("click", () =>{
            menu.classList.toggle("active");
        })
    </script>
</body>
</html>
